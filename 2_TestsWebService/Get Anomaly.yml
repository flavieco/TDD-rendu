info:
  name: Get Anomaly
  type: http
  seq: 5

http:
  method: GET
  url: "{{TAIGA_URL}}/issues/{{issue_id}}"
  auth: inherit

runtime:
  assertions:
    - expression: res.body.version
      operator: eq
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
