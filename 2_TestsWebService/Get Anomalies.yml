info:
  name: Get Anomalies
  type: http
  seq: 7

http:
  method: GET
  url: "{{TAIGA_URL}}//issues?project={{project_id}}"
  params:
    - name: project
      value: "{{project_id}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const anomalies = res.getBody();
        if (anomalies.length > 0) {
          bru.setVar("delete_issue_id", String(anomalies[0].id));
          bru.setNextRequest("Delete Anomaly");
        } else {
          bru.setNextRequest(null)
        }
  assertions:
    - expression: res.body
      operator: isArray
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: ""
        method: jsonq
      variable:
        name: ""
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
