info:
  name: Delete Anomaly
  type: http
  seq: 8

http:
  method: DELETE
  url: "{{TAIGA_URL}}/issues/{{delete_issue_id}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() >= 400) {
          bru.setNextRequest(null);
        } else {
          bru.setNextRequest("Get Anomalies");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
