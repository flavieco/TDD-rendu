info:
  name: Create Anomaly
  type: http
  seq: 4

http:
  method: POST
  url: "{{TAIGA_URL}}/issues"
  body:
    type: json
    data: |-
      {
        "project": "{{project_id}}",
        "subject": "Anomalie de test manuelle",
        "description": "Cette anomalie est creee avec des valeurs fixes pour valider le endpoint",
        "type": "{{bug_id}}",
        "severity": "{{critical_id}}",
        "priority": "{{high_id}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const bug = bru.getVar("types").find(t => t.name === "Bug");
        const critical = bru.getVar("severities").find(s => s.name === "Critical");
        const high = bru.getVar("priorities").find(p => p.name === "High");
        if (bug) bru.setVar("bug_id", String(bug.id));
        if (critical) bru.setVar("critical_id", String(critical.id));
        if (high) bru.setVar("high_id", String(high.id));
  assertions:
    - expression: res.body.id
      operator: isNumber
    - expression: res.body.ref
      operator: isNumber
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.ref
        method: jsonq
      variable:
        name: search_ref
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
