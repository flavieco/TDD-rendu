info:
  name: Filter Anomalies
  type: http
  seq: 7

http:
  method: GET
  url: "{{TAIGA_URL}}/issues?project={{project_id}}&type={{bug_id}}&severity={{critical_id}}"
  params:
    - name: project
      value: "{{project_id}}"
      type: query
    - name: type
      value: "{{bug_id}}"
      type: query
    - name: severity
      value: "{{critical_id}}"
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isArray

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
