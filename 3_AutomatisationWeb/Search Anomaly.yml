info:
  name: Search Anomaly
  type: http
  seq: 8

http:
  method: GET
  url: "{{TAIGA_URL}}/issues/by_ref?ref={{search_ref}}&project={{project_id}}"
  params:
    - name: ref
      value: "{{search_ref}}"
      type: query
    - name: project
      value: "{{project_id}}"
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.body.id
      operator: isNumber
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.id
        method: jsonq
      variable:
        name: found_issue_id
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
