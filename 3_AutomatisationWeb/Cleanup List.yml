info:
  name: Cleanup List
  type: http
  seq: 10

http:
  method: GET
  url: "{{TAIGA_URL}}/issues?project={{project_id}}"
  params:
    - name: project
      value: "{{project_id}}"
      type: query
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const anomalies = res.getBody();
        if (anomalies.length > 0) {
          bru.setVar("delete_id", String(anomalies[0].id));
          bru.setNextRequest("Cleanup Delete");
        } else {
          bru.setNextRequest(null);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
