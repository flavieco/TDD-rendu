info:
  name: Get JSON
  type: http
  seq: 5

http:
  method: GET
  url: http://localhost:3000/anomalies_json

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("current_issue", 0);
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body
        method: jsonq
      variable:
        name: json_issues
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
