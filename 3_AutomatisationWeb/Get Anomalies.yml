info:
  name: Get Anomalies
  type: http
  seq: 3

http:
  method: GET
  url: "{{TAIGA_URL}}/issues?project={{project_id}}"
  params:
    - name: project
      value: "{{project_id}}"
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.body
      operator: isArray

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
